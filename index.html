<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dinamik Sistem Simülasyonu — 6NGen</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.5.0/Recharts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #F5F7FA; }
    input[type=range] { width: 100%; accent-color: #2E75B6; cursor: pointer; }
    .tooltip-custom { background:#fff; border:1px solid #ddd; padding:8px 12px; border-radius:6px; font-size:12px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo } = React;
const {
  LineChart, Line, XAxis, YAxis, CartesianGrid,
  Tooltip, ResponsiveContainer, ReferenceLine
} = Recharts;

const BLUE = "#2E75B6";
const RED  = "#E05A4F";
const NAVY = "#1A3C5E";

// ── Runge-Kutta 4 çözücü: m*x'' + c*x' + k*x = F0*sin(wf*t)
function solveRK4({ m, c, k, F0, omega_f, dt, tEnd }) {
  const steps = Math.floor(tEnd / dt);
  const data = [];
  let x = 0, v = 0;
  const accel = (t, x, v) => (F0 * Math.sin(omega_f * t) - c * v - k * x) / m;

  for (let i = 0; i <= steps; i++) {
    const t = i * dt;
    data.push({ t: +t.toFixed(3), x: +x.toFixed(5) });
    const k1v = accel(t, x, v),           k1x = v;
    const k2v = accel(t+dt/2, x+k1x*dt/2, v+k1v*dt/2), k2x = v+k1v*dt/2;
    const k3v = accel(t+dt/2, x+k2x*dt/2, v+k2v*dt/2), k3x = v+k2v*dt/2;
    const k4v = accel(t+dt,   x+k3x*dt,   v+k3v*dt),   k4x = v+k3v*dt;
    v += (dt/6)*(k1v+2*k2v+2*k3v+k4v);
    x += (dt/6)*(k1x+2*k2x+2*k3x+k4x);
  }
  return data;
}

// ── Basit DFT magnitude spektrumu (son 512 nokta, 0–20 Hz)
function computeFFT(data, dt) {
  const N = data.length;
  const out = [];
  for (let k = 0; k < N / 2; k++) {
    const freq = k / (N * dt);
    if (freq > 20) break;
    let re = 0, im = 0;
    for (let n = 0; n < N; n++) {
      const a = (2 * Math.PI * k * n) / N;
      re += data[n].x * Math.cos(a);
      im -= data[n].x * Math.sin(a);
    }
    out.push({ freq: +freq.toFixed(3), mag: +(2/N*Math.sqrt(re*re+im*im)).toFixed(6) });
  }
  return out;
}

function Slider({ label, value, min, max, step, unit, onChange, info }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <span style={{ fontWeight:600, fontSize:13, color:NAVY }}>{label}</span>
        <span style={{ fontSize:13, color:BLUE, fontWeight:700 }}>
          {value} <span style={{ color:"#888", fontWeight:400 }}>{unit}</span>
        </span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={e => onChange(parseFloat(e.target.value))} />
      {info && <div style={{ fontSize:11, color:"#888", marginTop:2 }}>{info}</div>}
    </div>
  );
}

function App() {
  const [m, setM]         = useState(1);
  const [k, setK]         = useState(10);
  const [c, setC]         = useState(0.5);
  const [F0, setF0]       = useState(1);
  const [wf, setWf]       = useState(2);
  const [tab, setTab]     = useState("time");

  const omega_n = Math.sqrt(k / m);
  const zeta    = c / (2 * Math.sqrt(m * k));
  const fn_hz   = omega_n / (2 * Math.PI);

  let dLabel = "Az Sönümlü", dColor = BLUE;
  if (zeta >= 1)    { dLabel = "Aşırı Sönümlü";    dColor = "#888"; }
  else if (zeta >= 0.7) { dLabel = "Kritik Sönümlü"; dColor = "#E07F2E"; }
  else if (zeta < 0.05) { dLabel = "⚠️ Rezonansa Yakın!"; dColor = RED; }

  const timeData = useMemo(() =>
    solveRK4({ m, c, k, F0, omega_f: wf, dt: 0.02, tEnd: 20 }),
    [m, c, k, F0, wf]
  );

  const fftData = useMemo(() =>
    computeFFT(timeData.slice(-512), 0.02),
    [timeData]
  );

  const maxDisp = Math.max(...timeData.map(d => Math.abs(d.x))).toFixed(4);
  const chartData = timeData.filter((_, i) => i % 2 === 0);

  return (
    <div style={{ padding:16, maxWidth:1100, margin:"0 auto" }}>

      {/* Header */}
      <div style={{ background:NAVY, borderRadius:10, padding:"14px 20px", marginBottom:16, color:"#fff",
                    display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div>
          <div style={{ fontSize:18, fontWeight:700 }}>Dinamik Sistem Simülasyonu</div>
          <div style={{ fontSize:12, color:"#B0CAE8", marginTop:3 }}>
            Yay–Kütle–Sönümleyici &nbsp;|&nbsp; mẍ + cẋ + kx = F₀·sin(ω_f·t)
          </div>
        </div>
        <div style={{ fontSize:12, color:"#B0CAE8", textAlign:"right" }}>
          6NGen &nbsp;|&nbsp; Ömer Faruk Durna
        </div>
      </div>

      <div style={{ display:"flex", gap:14, flexWrap:"wrap" }}>

        {/* Sol panel – parametreler */}
        <div style={{ background:"#fff", borderRadius:10, padding:18, flex:"0 0 240px",
                      boxShadow:"0 1px 6px rgba(0,0,0,0.08)" }}>
          <div style={{ fontSize:13, fontWeight:700, color:NAVY, marginBottom:12,
                        borderBottom:`2px solid ${BLUE}`, paddingBottom:6 }}>
            📐 Sistem Parametreleri
          </div>
          <Slider label="Kütle (m)"        value={m}  min={0.5} max={5}   step={0.1}  unit="kg"    onChange={setM}  info="Büyük kütle → yavaş titreşim" />
          <Slider label="Yay Sabiti (k)"   value={k}  min={1}   max={100} step={1}    unit="N/m"   onChange={setK}  info="Sertlik artar → frekans artar" />
          <Slider label="Sönüm (c)"        value={c}  min={0.05} max={10} step={0.05} unit="N·s/m" onChange={setC}  info="Büyük c → hızlı durma" />

          <div style={{ fontSize:13, fontWeight:700, color:NAVY, margin:"14px 0 10px",
                        borderBottom:`2px solid ${BLUE}`, paddingBottom:6 }}>
            🔄 Dış Kuvvet F(t)
          </div>
          <Slider label="Genlik (F₀)"      value={F0} min={0}   max={10}  step={0.1}  unit="N"     onChange={setF0} />
          <Slider label="Frekans (ω_f)"    value={wf} min={0.1} max={15}  step={0.1}  unit="rad/s" onChange={setWf}
            info={`Doğal frekans: ${omega_n.toFixed(2)} rad/s`} />

          {/* Metrikler */}
          <div style={{ background:"#EEF4FB", borderRadius:8, padding:12, marginTop:10, fontSize:12 }}>
            {[
              ["Doğal frekans ωₙ", `${omega_n.toFixed(2)} rad/s`, NAVY],
              ["fₙ",               `${fn_hz.toFixed(3)} Hz`,      NAVY],
              ["Sönüm oranı ζ",    `${zeta.toFixed(3)}`,          NAVY],
              ["Maks. deplasman",  `${maxDisp} m`,                 RED],
            ].map(([lbl, val, col]) => (
              <div key={lbl} style={{ marginBottom:6 }}>
                <span style={{ color:"#666" }}>{lbl}:</span>
                <span style={{ float:"right", fontWeight:700, color:col }}>{val}</span>
              </div>
            ))}
            <div style={{ marginTop:8, padding:"5px 8px", background:dColor+"22",
                          borderRadius:6, color:dColor, fontWeight:700, textAlign:"center" }}>
              {dLabel}
            </div>
          </div>
        </div>

        {/* Sağ panel – grafikler */}
        <div style={{ flex:1, minWidth:280 }}>
          {/* Sekmeler */}
          <div style={{ display:"flex", gap:8, marginBottom:10 }}>
            {[["time","⏱ Zaman Cevabı"],["fft","📊 FFT Spektrumu"]].map(([id, lbl]) => (
              <button key={id} onClick={() => setTab(id)}
                style={{ padding:"7px 16px", borderRadius:7, border:"none", cursor:"pointer",
                         fontWeight:600, fontSize:13,
                         background: tab===id ? BLUE : "#fff",
                         color:       tab===id ? "#fff" : NAVY,
                         boxShadow:"0 1px 4px rgba(0,0,0,0.1)" }}>
                {lbl}
              </button>
            ))}
          </div>

          {/* Zaman grafiği */}
          {tab === "time" && (
            <div style={{ background:"#fff", borderRadius:10, padding:16, boxShadow:"0 1px 6px rgba(0,0,0,0.08)" }}>
              <div style={{ fontSize:13, color:"#666", marginBottom:8 }}>
                Deplasman x(t) — 20 saniye &nbsp;|&nbsp; x₀ = 0, v₀ = 0
              </div>
              <ResponsiveContainer width="100%" height={280}>
                <LineChart data={chartData} margin={{ top:5, right:10, bottom:20, left:10 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#eee" />
                  <XAxis dataKey="t"
                    label={{ value:"Zaman (s)", position:"insideBottom", offset:-10, fontSize:11 }}
                    tick={{ fontSize:11 }} />
                  <YAxis
                    label={{ value:"x (m)", angle:-90, position:"insideLeft", fontSize:11 }}
                    tick={{ fontSize:11 }} />
                  <Tooltip
                    formatter={v => [`${v} m`, "Deplasman"]}
                    labelFormatter={l => `t = ${l} s`} />
                  <ReferenceLine y={0} stroke="#bbb" />
                  <Line type="monotone" dataKey="x" dot={false} stroke={BLUE} strokeWidth={1.8} />
                </LineChart>
              </ResponsiveContainer>

              {/* Sistem diyagramı */}
              <div style={{ marginTop:14, padding:12, background:"#F5F7FA", borderRadius:8, textAlign:"center" }}>
                <svg width="300" height="80" viewBox="0 0 300 80">
                  <rect x="0" y="10" width="12" height="60" fill={NAVY} rx="2"/>
                  {[...Array(7)].map((_,i) => (
                    <line key={i} x1={12+i*15} y1={i%2===0?30:50} x2={12+(i+1)*15} y2={i%2===0?50:30}
                      stroke={BLUE} strokeWidth="2"/>
                  ))}
                  <line x1="12" y1="40" x2="20" y2="40" stroke={BLUE} strokeWidth="2"/>
                  <line x1="117" y1="40" x2="125" y2="40" stroke={BLUE} strokeWidth="2"/>
                  <text x="60" y="72" textAnchor="middle" fontSize="11" fill={BLUE}>k = {k} N/m</text>
                  <line x1="125" y1="28" x2="125" y2="52" stroke="#888" strokeWidth="2"/>
                  <rect x="125" y="33" width="30" height="14" fill="none" stroke="#888" strokeWidth="2"/>
                  <line x1="140" y1="26" x2="140" y2="33" stroke="#888" strokeWidth="2"/>
                  <line x1="155" y1="40" x2="165" y2="40" stroke="#888" strokeWidth="2"/>
                  <text x="140" y="72" textAnchor="middle" fontSize="11" fill="#888">c = {c}</text>
                  <rect x="165" y="23" width="55" height="34" fill={NAVY} rx="4"/>
                  <text x="192" y="44" textAnchor="middle" fontSize="12" fill="#fff" fontWeight="bold">m = {m}</text>
                  <defs>
                    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
                      <path d="M0,0 L0,6 L8,3 z" fill={RED}/>
                    </marker>
                  </defs>
                  <line x1="220" y1="40" x2="250" y2="40" stroke={RED} strokeWidth="2.5" markerEnd="url(#arr)"/>
                  <text x="258" y="44" fontSize="11" fill={RED}>F(t)</text>
                </svg>
              </div>
            </div>
          )}

          {/* FFT grafiği */}
          {tab === "fft" && (
            <div style={{ background:"#fff", borderRadius:10, padding:16, boxShadow:"0 1px 6px rgba(0,0,0,0.08)" }}>
              <div style={{ fontSize:13, color:"#666", marginBottom:8 }}>
                Frekans Spektrumu (FFT) — pik = baskın titreşim frekansı
              </div>
              <ResponsiveContainer width="100%" height={280}>
                <LineChart data={fftData} margin={{ top:5, right:10, bottom:20, left:10 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#eee" />
                  <XAxis dataKey="freq"
                    label={{ value:"Frekans (Hz)", position:"insideBottom", offset:-10, fontSize:11 }}
                    tick={{ fontSize:11 }} />
                  <YAxis
                    label={{ value:"Genlik", angle:-90, position:"insideLeft", fontSize:11 }}
                    tick={{ fontSize:11 }} />
                  <Tooltip
                    formatter={v => [v.toFixed(5), "Genlik"]}
                    labelFormatter={l => `${l} Hz`} />
                  <ReferenceLine x={fn_hz} stroke={RED} strokeDasharray="4 2"
                    label={{ value:`fₙ = ${fn_hz.toFixed(2)} Hz`, fill:RED, fontSize:10 }} />
                  <Line type="monotone" dataKey="mag" dot={false} stroke={BLUE} strokeWidth={1.8} />
                </LineChart>
              </ResponsiveContainer>
              <div style={{ fontSize:12, color:"#555", marginTop:10, padding:"8px 12px",
                            background:"#FFF3F3", borderRadius:8 }}>
                🔴 Kırmızı çizgi = doğal frekans fₙ = <strong>{fn_hz.toFixed(3)} Hz</strong>.
                ω_f buna yaklaşınca pik büyür → <strong>rezonans!</strong>
                Rulman arıza tespiti de bu prensiple çalışır.
              </div>
            </div>
          )}

          {/* Açıklama kutusu */}
          <div style={{ background:"#fff", borderRadius:10, padding:14, marginTop:12,
                        boxShadow:"0 1px 6px rgba(0,0,0,0.08)", fontSize:12, color:"#444", lineHeight:1.8 }}>
            <strong style={{ color:NAVY }}>Fizik özeti</strong><br/>
            <strong>ζ &lt; 1</strong> → Sönümlü salınım (gerçek makineler genelde burada)<br/>
            <strong>ζ ≈ 0</strong> → Sönümsüz → sistem sonsuza titreşir<br/>
            <strong>ω_f = ωₙ</strong> → Rezonans → genlik patlar, mil/rulman kırılır<br/>
            <strong>FFT sekmesi</strong> → Hangi frekansta ne kadar titreşiyor? Arıza tespitinin temeli budur.
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
